# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring logic, feature engineering, JD analysis, weight tuning,
  and honeypot detection design were done by the team based on careful
  reading of the JD including the hackathon hint section.
  No candidate data was fed to any external LLM during the ranking step.
  The rank.py script makes zero external network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with JD-specific feature engineering.
  Five scoring components: career narrative fit (35%), skills match (30%),
  behavioral signals (15%), education (12%), location/notice period (8%).

  Career narrative is scored by searching production ML signals in role
  descriptions using 30+ regex patterns — not skill keywords. A candidate
  who built a LambdaMART ranking system and measured NDCG in production
  scores highly even if their skill list omits the exact JD keywords.

  Behavioral signals act as a multiplicative modifier (0.4x to 1.0x):
  a candidate with 5% recruiter response rate gets a 0.4x multiplier
  applied to their entire composite score, structurally preventing
  unreachable candidates from dominating the ranking.

  Honeypot detection uses 6 consistency checks (needs 2+ flags):
  inverted salary range, skill duration exceeding career length,
  total career months exceeding stated YOE, expert proficiency with zero
  duration months, assessment score contradicting expert claim, and
  YOE impossible given graduation year. Flagged 2,213 honeypots.

  Sandbox (neurorecruit.streamlit.app) uses heap-based streaming to
  process the full 487MB candidates.jsonl without loading all candidates
  into memory simultaneously. Also features real-time JD bias detection
  and per-candidate gap analysis with interview questions.

  Runtime: ~46 seconds for full 100K pool on CPU. Zero external calls.

