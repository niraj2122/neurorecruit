ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  All scoring logic, feature engineering, and JD analysis was done by the team.
  No candidate data was fed to any external LLM during the ranking step.
  The ranking script itself makes zero network calls.

methodology_summary: |
  Rule-based multi-signal ranker with JD-specific feature engineering.
  Five components: career narrative fit (35%), skills match (30%), behavioral
  signals (15%), education (12%), location/notice (8%). Career narrative is
  scored by searching production ML signals in role descriptions — not just
  skill keywords. Behavioral signals act as a multiplicative modifier: a
  candidate with 5% recruiter response rate gets a 0.4x availability penalty
  regardless of how strong their profile looks. Honeypot detection uses three
  checks: inverted salary, skill duration exceeding career length, and
  assessment score contradicting claimed proficiency level. Runtime: ~60s on
  CPU for the full 100K pool. Zero external model calls.

declarations:
  read_submission_spec: true
  code_is_original_work: true
